name: Reusable Promote Target Patch Branch to Main

on:
  workflow_call:
    inputs:
      branch_name:
        description: "Branch name to promote (must match target-patch-*)"
        required: true
        type: string
      approvers:
        description: "Comma-separated list of GitHub usernames who can approve"
        required: true
        type: string
      github_app_client_id:
        description: "The Client ID for the GitHub App"
        required: true
        type: string
    secrets:
      SLACK_WEBHOOK_URL:
        required: false
      PARADEDB_GITHUB_APP_PRIVATE_KEY:
        required: true

jobs:
  promote-branch:
    name: Promote Target Patch Branch to Main
    runs-on: ubuntu-latest

    permissions:
      actions: write
      contents: write
      issues: write
      pull-requests: read

    steps:
      - name: Generate GitHub App Token
        id: app-token
        uses: actions/create-github-app-token@v3
        with:
          client-id: ${{ inputs.github_app_client_id }}
          private-key: ${{ secrets.PARADEDB_GITHUB_APP_PRIVATE_KEY }}

      # Only the scripts are needed here; the promotion deepens this checkout to
      # the branches it actually touches. See reusable-rebase.yml.
      - name: Checkout Repository
        uses: actions/checkout@v7
        with:
          fetch-depth: 1
          token: ${{ steps.app-token.outputs.token }}
          persist-credentials: false

      - name: Extract Sync Configuration
        id: config
        run: |
          source scripts/sync-upstream.sh
          echo "upstream_repo_url=${UPSTREAM_REPO_URL:-}" >> "$GITHUB_OUTPUT"
          echo "upstream_branch=${UPSTREAM_BRANCH:-main}" >> "$GITHUB_OUTPUT"
          echo "target_branch=${TARGET_BRANCH:-main}" >> "$GITHUB_OUTPUT"

      - name: Manual Approval Before Promotion
        uses: trstringer/manual-approval@v1
        with:
          secret: ${{ github.token }}
          approvers: ${{ inputs.approvers }}
          minimum-approvals: 1
          issue-title: "Promote ${{ inputs.branch_name }} to ${{ steps.config.outputs.target_branch }}?"
          issue-body: |
            Please approve or deny the promotion of branch `${{ inputs.branch_name }}` to `${{ steps.config.outputs.target_branch }}`.

            From a local checkout of the target repository, run:
            ```console
            ./scripts/sync-upstream.sh range-diff ${{ inputs.branch_name }}
            ```
            ...to view the diff between this branch and `${{ steps.config.outputs.target_branch }}`.

      - name: Configure Git
        env:
          APP_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          git config --global user.name "paradedb-github-app[bot]"
          git config --global user.email "282009505+paradedb-github-app[bot]@users.noreply.github.com"
          git remote set-url origin "https://x-access-token:${APP_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"

      - name: Promote Branch to Main
        id: promote
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          GITHUB_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          set -euxo pipefail
          BRANCH_NAME="${{ inputs.branch_name }}"
          echo "Starting branch promotion process..."
          echo "Branch: $BRANCH_NAME"

          ./scripts/sync-upstream.sh promote "$BRANCH_NAME"

          echo "✅ Branch promotion completed successfully"
          echo "success=true" >> "$GITHUB_OUTPUT"
          echo "branch_name=$BRANCH_NAME" >> "$GITHUB_OUTPUT"

      - name: Notify Slack on Failure
        if: failure()
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          USERNAME_MAPPING_GITHUB_TO_SLACK: ${{ vars.USERNAME_MAPPING_GITHUB_TO_SLACK }}
          APPROVERS: ${{ inputs.approvers }}
          ACTOR: ${{ github.actor }}
        run: |
          if [ -n "$SLACK_WEBHOOK_URL" ]; then
            BRANCH_NAME="${{ steps.promote.outputs.branch_name || inputs.branch_name || 'unknown' }}"

            source scripts/sync-upstream.sh
            SLACK_MENTION=$(slack_mention_for_user "$ACTOR")

            curl -X POST -H 'Content-type: application/json' \
              --data "{
                \"text\": \"🚨 Branch Promotion Failed - $SLACK_MENTION\",
                \"attachments\": [
                  {
                    \"color\": \"danger\",
                    \"fields\": [
                      {\"title\": \"Repository\", \"value\": \"${{ github.repository }}\", \"short\": true},
                      {\"title\": \"Branch\", \"value\": \"${BRANCH_NAME}\", \"short\": true},
                      {\"title\": \"Workflow\", \"value\": \"${{ github.workflow }}\", \"short\": true},
                      {\"title\": \"Triggered By\", \"value\": \"${{ github.actor }}\", \"short\": true},
                      {\"title\": \"Run ID\", \"value\": \"${{ github.run_id }}\", \"short\": true},
                      {\"title\": \"View Logs\", \"value\": \"<${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}|Click here>\", \"short\": false}
                    ]
                  }
                ]
              }" \
              "$SLACK_WEBHOOK_URL"
          else
            echo "Slack webhook not configured, skipping notification"
          fi
